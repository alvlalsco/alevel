<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Level Events | Sunway A-Level Student Committee (ALSCO)</title>
    <link rel="icon" type="image/x-icon" href="/images/alsco_logo.avif">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/output.css">
</head>

<body class="antialiased">

    <!-- ========================================================================
         EVENTS PAGE
         scripts/events.js fills these from siteContent.eventsPage:
           #events-upcoming-container → upcoming events (or a "Stay tuned" card)
           #events-past-container     → past events archive
         The three placeholder <div>s below are injected at runtime by script.js.
         ===================================================================== -->
    <div id="svg-defs-placeholder"></div>  <!-- shared SVG icons (svg-defs.html) -->

    <div id="navbar-placeholder"></div>    <!-- shared navbar (nav.html) -->

    <main>
        <section class="section-intro">
            <div class="section-container">
                <div class="section-heading">
                    <span class="text-maroon font-bold tracking-[0.2em] uppercase text-xs mb-4">Upcoming &
                        Past</span>

                    <h1 class="font-black text-main tracking-tight uppercase">
                        Events
                    </h1>

                    <div class="heading-divider">
                        <div class="heading-divider-line"></div>
                        <div class="heading-divider-dot"></div>
                        <div class="heading-divider-line"></div>
                    </div>
                </div>
            </div>
        </section>

        <div class="section-container-6xl py-12 lg:py-16">
            <div id="events-upcoming-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <p class="text-center text-gray-400">Loading upcoming events...</p>
            </div>
        </div>

        <section class="py-12 lg:py-16 border-b-custom">
            <div class="section-container">
                <div class="section-heading">
                    <span class="text-maroon font-bold tracking-[0.2em] uppercase text-xs mb-4">Archive
                    </span>

                    <h2 class="font-black text-main tracking-tight uppercase">
                        Past Events
                    </h2>

                    <div class="heading-divider">
                        <div class="heading-divider-line"></div>
                        <div class="heading-divider-dot"></div>
                        <div class="heading-divider-line"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-16 lg:py-20 bg-gray-50 border-t-custom">
            <div class="section-container-6xl">
                <div id="events-past-container"
                    class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-16 items-start mt-8">
                    <p class="text-center text-gray-400 col-span-full">Loading archive...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>     <!-- shared footer (footer.html) -->

    <!-- Load order is a contract — content.js first. See GUIDE.md. -->
    <script src="/scripts/content.js"></script>  <!-- 1. data bank -->
    <script src="/script.js"></script>            <!-- 2. helpers + navbar/footer -->
    <script src="/scripts/events.js"></script>    <!-- 3. fills this page -->
</body>

</html>
