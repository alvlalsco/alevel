<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Committee | Sunway A-Level Student Committee (ALSCO)</title>
    <link rel="icon" type="image/x-icon" href="/images/alsco_logo.avif">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/output.css">
</head>

<body class="antialiased bg-white overflow-x-hidden">

    <div id="navbar-placeholder"></div>

    <main>
        <section class="py-16 lg:py-20 bg-gray-50 border-b-custom">
            <div class="max-w-7xl mx-auto px-6 lg:px-8">
                <div class="text-center mb-16">
                    <span class="primary-maroon font-bold tracking-[0.2em] uppercase text-xs">The Team</span>
                    <h1 class="text-4xl md:text-5xl font-black text-main tracking-tight uppercase mt-2">
                        Meet The Committee
                    </h1>
                </div>

                <div id="high-council-tree" class="flex flex-col items-center gap-10 mb-20">
                </div>

                <div id="dept-roster" class="space-y-20">
                </div>
            </div>
        </section>

        <section class="py-12 lg:py-16 border-b-custom">
            <div class="max-w-7xl mx-auto px-6 lg:px-8">
                <div class="flex flex-col items-center text-center">
                    <span class="primary-maroon font-bold tracking-[0.2em] uppercase text-xs mb-4">Core
                        Structure</span>

                    <h1 class="text-4xl md:text-5xl font-black text-main tracking-tight uppercase">
                        Departments
                    </h1>

                    <div class="flex items-center gap-4 mt-8">
                        <div class="w-12 h-0.5 bg-gray-300"></div>
                        <div class="w-2 h-2 rounded-full bg-maroon"></div>
                        <div class="w-12 h-0.5 bg-gray-300"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-12 lg:py-16">
            <div class="max-w-7xl mx-auto px-6 lg:px-8">
                <div id="departments-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
                    <p class="text-center text-gray-400 col-span-full">Loading departments...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="/scripts/content.js"></script>
    <script src="/script.js"></script>
    <script src="/scripts/committee.js"></script>
</body>

</html>
