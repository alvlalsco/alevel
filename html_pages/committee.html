<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Committee | Sunway A-Level Student Committee (ALSCO)</title>
    <meta name="description"
        content="Meet the ALSCO High Council, department members, and committee structure behind the Sunway A-Level Student Committee.">
    <link rel="canonical" href="https://sunwayalevelalsco.netlify.app/html_pages/committee.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Sunway A-Level Student Committee (ALSCO)">
    <meta property="og:title" content="Committee | Sunway A-Level Student Committee">
    <meta property="og:description"
        content="The High Council, departments, and members who run ALSCO at Sunway College.">
    <meta property="og:url" content="https://sunwayalevelalsco.netlify.app/html_pages/committee.html">
    <meta property="og:image" content="https://sunwayalevelalsco.netlify.app/images/alsco_logo_long.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://sunwayalevelalsco.netlify.app/images/alsco_logo_long.jpg">
    <link rel="icon" type="image/x-icon" href="/images/alsco_logo.avif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/output.css">
</head>

<body class="antialiased bg-white overflow-x-hidden">

    <!-- ========================================================================
         COMMITTEE PAGE
         scripts/committee.js fills these empty containers from
         siteContent.committee:
           #high-council-tree    → the leadership "pyramid" (order-sensitive)
           #dept-roster          → each department's leaders + members
           #departments-container→ department detail cards (formal/playful photos)
         navbar + footer are injected at runtime by script.js.
         ===================================================================== -->
    <div id="navbar-placeholder"></div>

    <main>
        <section id="committee-section" class="section-intro bg-gray-50">
            <div class="section-container">

                <div id="committee-header" class="text-center mb-16">
                    <span id="committee-subtitle" class="text-maroon font-bold tracking-[0.2em] uppercase text-xs">The
                        Team</span>
                    <h1 id="committee-title" class="font-black text-main tracking-tight uppercase mt-2">
                        Meet The Committee
                    </h1>
                </div>

                <div id="high-council-tree" class="flex flex-col items-center gap-10 mb-20">
                </div>

                <div id="dept-roster" class="space-y-20">
                </div>

            </div>
        </section>

        <section id="departments-section" class="py-12 lg:py-16 border-b-custom">
            <div class="section-container">

                <div id="departments-header" class="section-heading mb-12 lg:mb-16">
                    <span id="departments-subtitle"
                        class="text-maroon font-bold tracking-[0.2em] uppercase text-xs mb-4">Core Structure</span>

                    <h2 id="departments-title" class="font-black text-main tracking-tight uppercase">
                        Departments
                    </h2>

                    <div class="heading-divider">
                        <div class="heading-divider-line"></div>
                        <div class="heading-divider-dot"></div>
                        <div class="heading-divider-line"></div>
                    </div>
                </div>

                <div id="departments-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
                    <p id="departments-loading-text" class="text-center text-gray-400 col-span-full">Loading
                        departments...</p>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Load order is a contract — content.js first. See GUIDE.md. -->
    <script defer src="/scripts/content.js"></script>   <!-- 1. data bank -->
    <script defer src="/script.js"></script>             <!-- 2. helpers + navbar/footer -->
    <script defer src="/scripts/committee.js"></script>  <!-- 3. fills this page -->
</body>

</html>
