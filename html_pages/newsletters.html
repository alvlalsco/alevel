<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletters | ALSCO</title>
    <link rel="icon" type="image/x-icon" href="/images/alsco_logo.avif">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/output.css">
</head>

<body class="antialiased">

    <div id="navbar-placeholder"></div>

    <main>
        <section id="newsletter-hero-bg" class="relative py-20 lg:py-28 bg-gray-900 bg-cover bg-center bg-no-repeat">
            <div class="absolute inset-0 bg-black/30"></div>

            <div class="relative z-10 max-w-7xl mx-auto px-6 lg:px-8">
                <div class="flex flex-col items-center text-center">
                    <span class="text-gray-200 font-bold tracking-[0.2em] uppercase text-xs mb-4">Monthly Updates</span>

                    <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight uppercase mb-8">
                        Newsletters
                    </h1>

                    <div
                        class="w-full max-w-md bg-white/10 backdrop-blur-sm p-2 rounded-full border border-white/20 flex flex-col sm:flex-row gap-2">
                        <input id="newsletter-email-input" type="email" placeholder="Enter your email address"
                            class="grow bg-transparent text-white placeholder-gray-300 px-6 py-3 rounded-full outline-none focus:bg-white/10 transition-colors">

                        <button id="newsletter-sub-btn" onclick="submitNewsletter()"
                            class="btn-modern bg-white text-maroon hover:bg-gray-100 font-bold whitespace-nowrap px-8 py-3 rounded-full">
                            Subscribe
                        </button>
                    </div>

                    <p id="newsletter-success-msg" class="text-green-400 text-sm mt-3 font-bold hidden">
                        ✓ Successfully subscribed!
                    </p>
                    <p id="newsletter-error-msg" class="text-red-400 text-sm mt-3 font-bold hidden">
                        ⚠ Please enter a valid email.
                    </p>
                    <p class="text-gray-300 text-xs mt-3 uppercase tracking-wider">Get the latest updates delivered to
                        your inbox.</p>
                </div>
            </div>
        </section>

        <div class="max-w-7xl mx-auto px-6 lg:px-8 py-12 lg:py-16">
            <div class="flex flex-wrap justify-center gap-3 mb-12">
                <button data-filter="all"
                    class="filter-btn bg-maroon text-white px-6 py-2 rounded-full border border-maroon font-bold transition-colors">
                    All
                </button>
                <button data-filter="newsletter"
                    class="filter-btn bg-transparent text-maroon hover:bg-gray-100 px-6 py-2 rounded-full border border-maroon font-bold transition-colors">
                    Newsletters
                </button>
                <button data-filter="post"
                    class="filter-btn bg-transparent text-maroon hover:bg-gray-100 px-6 py-2 rounded-full border border-maroon font-bold transition-colors">
                    Monthly Posts
                </button>
            </div>

            <article id="newsletter-list-container" class="space-y-8 lg:space-y-12">
                <p class="text-center text-gray-400">Loading newsletters...</p>
            </article>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="/scripts/content.js"></script>
    <script src="/script.js"></script>
    <script src="/script/newsletter.js"></script>
</body>

</html>
