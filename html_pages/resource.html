<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources | Sunway A-Level Student Committee (ALSCO)</title>
    <meta name="description"
        content="Newsletters, monthly posts, the student handbook, and academic resources from ALSCO for Sunway A-Level students.">
    <link rel="canonical" href="https://sunwayalevelalsco.netlify.app/html_pages/resource.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Sunway A-Level Student Committee (ALSCO)">
    <meta property="og:title" content="Resources | Sunway A-Level Student Committee">
    <meta property="og:description"
        content="Newsletters, the student handbook, and academic resources for A-Level students at Sunway College.">
    <meta property="og:url" content="https://sunwayalevelalsco.netlify.app/html_pages/resource.html">
    <meta property="og:image" content="https://sunwayalevelalsco.netlify.app/images/alsco_logo_long.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://sunwayalevelalsco.netlify.app/images/alsco_logo_long.jpg">
    <link rel="icon" type="image/x-icon" href="/images/alsco_logo.avif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/output.css">
</head>

<body class="antialiased">

    <!-- ========================================================================
         RESOURCES PAGE
         scripts/resource.js fills these from siteContent.resourcePage:
           #publication-list-container → publications gallery (+ filter buttons)
           #handbook-list-container    → handbook list
           #resources-list-container   → academic resource links
         The newsletter Subscribe button calls submitEmail() (in resource.js).
         The three placeholder <div>s below are injected at runtime by script.js.
         ===================================================================== -->
    <div id="svg-defs-placeholder"></div>  <!-- shared SVG icons (svg-defs.html) -->

    <div id="navbar-placeholder"></div>    <!-- shared navbar (nav.html) -->

    <main>
        <section id="resource-hero-bg" class="relative py-20 lg:py-28 bg-gray-900 bg-cover bg-center bg-no-repeat">
            <div class="absolute inset-0 bg-black/30"></div>

            <div class="relative z-10 section-container">
                <div class="section-heading">
                    <span class="text-gray-200 font-bold tracking-[0.2em] uppercase text-xs mb-4">Monthly Updates</span>

                    <h1 class="font-black text-white tracking-tight uppercase mb-8">
                        Publications
                    </h1>

                    <div
                        class="w-full max-w-md bg-white/10 backdrop-blur-sm p-2 sm:p-1.5 rounded-2xl sm:rounded-full border border-white/20 flex flex-col sm:flex-row items-stretch sm:items-center gap-2 sm:gap-1">

                        <input id="publication-email-input" type="email" placeholder="Enter your email address"
                            class="w-full grow min-w-0 bg-transparent text-white placeholder-gray-300 px-4 py-2.5 sm:py-2 text-center sm:text-left text-sm sm:text-base rounded-full outline-none focus:bg-white/10 transition-colors">

                        <button id="publication-sub-btn" onclick="submitEmail()"
                            class="w-full sm:w-auto bg-white text-maroon hover:bg-gray-100 font-bold whitespace-nowrap px-5 py-2.5 sm:py-2 text-sm sm:text-base rounded-full transition-colors">
                            Subscribe
                        </button>

                    </div>

                    <p id="publication-success-msg" class="text-green-400 text-sm mt-3 font-bold hidden">
                        ✓ Successfully subscribed!
                    </p>
                    <p id="publication-error-msg" class="text-red-400 text-sm mt-3 font-bold hidden">
                        ⚠ Please enter a valid email.
                    </p>
                    <p class="text-gray-300 text-xs mt-3 uppercase tracking-wider">Get the latest updates delivered to
                        your inbox.</p>
                </div>
            </div>
        </section>

        <div class="section-container-6xl py-12 lg:py-16">
            <div class="flex flex-wrap justify-center gap-3 mb-4 md:mb-12">
                <button data-filter="all" class="filter-btn btn-outline px-2 py-1">
                    All
                </button>
                <button data-filter="newsletter" class="filter-btn btn-outline px-2 py-1">
                    Newsletters
                </button>
                <button data-filter="post" class="filter-btn btn-outline px-2 py-1">
                    Monthly Posts
                </button>
            </div>

            <article id="publication-list-container" class="space-y-8 lg:space-y-12">
                <p class="text-center text-gray-400">Loading publications...</p>
            </article>
        </div>

        <section class="section-intro">
            <div class="section-container">
                <div class="section-heading">
                    <span class="text-maroon font-bold tracking-[0.2em] uppercase text-xs mb-4">Stay Informed</span>

                    <h2 class="font-black text-main tracking-tight uppercase">
                        HandBook
                    </h2>

                    <div class="heading-divider">
                        <div class="heading-divider-line"></div>
                        <div class="heading-divider-dot"></div>
                        <div class="heading-divider-line"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-12 lg:py-16">
            <div class="section-container-6xl">
                <div id="handbook-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12">
                    <p class="text-center text-gray-400 col-span-full">Loading Handbook...</p>
                </div>
            </div>
        </section>

        <section class="section-intro">
            <div class="section-container">
                <div class="section-heading">
                    <span class="text-maroon font-bold tracking-[0.2em] uppercase text-xs mb-4">Academic & Revision</span>

                    <h2 class="font-black text-main tracking-tight uppercase">
                        Student Resources
                    </h2>

                    <div class="heading-divider">
                        <div class="heading-divider-line"></div>
                        <div class="heading-divider-dot"></div>
                        <div class="heading-divider-line"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-12 lg:py-16">
            <div class="section-container">
                <div id="resources-list-container"
                    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8 items-start">
                    <p class="text-center text-gray-400 col-span-full">Loading Resources...</p>
                </div>
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>     <!-- shared footer (footer.html) -->

    <!-- Load order is a contract — content.js first. See GUIDE.md. -->
    <script defer src="/scripts/content.js"></script>  <!-- 1. data bank -->
    <script defer src="/script.js"></script>            <!-- 2. helpers + navbar/footer -->
    <script defer src="/scripts/resource.js"></script>  <!-- 3. fills this page -->
</body>

</html>
