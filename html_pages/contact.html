<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get In Touch | Sunway A-Level Student Committee (ALSCO)</title>
    <meta name="description"
        content="Get in touch with ALSCO, the Sunway A-Level Student Committee — find us on Instagram, TikTok, and by email.">
    <link rel="canonical" href="https://sunwayalevelalsco.netlify.app/html_pages/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Sunway A-Level Student Committee (ALSCO)">
    <meta property="og:title" content="Contact | Sunway A-Level Student Committee">
    <meta property="og:description"
        content="Reach ALSCO on Instagram, TikTok, and email.">
    <meta property="og:url" content="https://sunwayalevelalsco.netlify.app/html_pages/contact.html">
    <meta property="og:image" content="https://sunwayalevelalsco.netlify.app/images/alsco_logo_long.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://sunwayalevelalsco.netlify.app/images/alsco_logo_long.jpg">
    <link rel="icon" type="image/x-icon" href="/images/alsco_logo.avif">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/output.css">
</head>

<body class="antialiased">

    <!-- ========================================================================
         CONTACT PAGE
         The contact cards are built from siteContent.contact.cards by
         scripts/contact.js into #contact-cards-container below. To change the
         handles/links, edit content.js — not this file.
         navbar + footer are injected at runtime by script.js.
         ===================================================================== -->
    <div id="navbar-placeholder"></div>

    <main>
        <section class="section-intro">
            <div class="section-container">
                <div class="section-heading">
                    <span class="text-maroon font-bold tracking-[0.2em] uppercase text-xs mb-4">Contact Us</span>

                    <h1 class="font-black text-main tracking-tight uppercase">
                        Get In Touch
                    </h1>

                    <div class="heading-divider">
                        <div class="heading-divider-line"></div>
                        <div class="heading-divider-dot"></div>
                        <div class="heading-divider-line"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section-container py-12 lg:py-16">
            <!-- Filled by scripts/contact.js from siteContent.contact.cards -->
            <div id="contact-cards-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <p class="text-center text-gray-400 col-span-full">Loading contact details...</p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Load order is a contract — content.js first. See GUIDE.md. -->
    <script src="/scripts/content.js"></script>  <!-- 1. data bank -->
    <script src="/script.js"></script>            <!-- 2. helpers + navbar/footer -->
    <script src="/scripts/contact.js"></script>   <!-- 3. fills this page -->

</body>

</html>
